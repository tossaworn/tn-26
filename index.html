<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training FixedIP & Forward Port</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Anuphan:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: rgba(99, 102, 241, 0.08);
            --secondary: #0891b2;
            --bg: #f0f4f8;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.06);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 16px 40px rgba(99, 102, 241, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Anuphan', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(ellipse at 10% 0%, rgba(99, 102, 241, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, rgba(8, 145, 178, 0.07) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 3rem;
        }

        .container {
            max-width: 1040px;
            width: 100%;
            animation: fadeIn 0.7s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-light);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 99px;
            padding: 4px 14px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            width: 100%;
        }

        @media (max-width: 768px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
        }

        .link-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(1.6rem, 4vw, 2.2rem) clamp(1.8rem, 4vw, 2.4rem);
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: clamp(1.2rem, 3vw, 1.6rem);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .link-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(99, 102, 241, 0.25);
        }

        .icon-wrapper {
            width: clamp(56px, 8vw, 68px);
            height: clamp(56px, 8vw, 68px);
            border-radius: 18px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .link-card:hover .icon-wrapper {
            background: var(--primary);
            color: white;
            transform: scale(1.08) rotate(5deg);
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        .content h3 {
            font-size: clamp(1.15rem, 3vw, 1.45rem);
            font-weight: 600;
            margin-bottom: 0.2rem;
            line-height: 1.4;
        }

        .content p {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .link-arrow {
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-6px);
            transition: all 0.25s ease;
        }

        .link-card:hover .link-arrow {
            opacity: 1;
            transform: translateX(0);
            color: var(--primary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: clamp(28px, 4vw, 34px);
            height: clamp(28px, 4vw, 34px);
            stroke-width: 2;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .arrow-icon {
            width: clamp(20px, 3vw, 24px);
            height: clamp(20px, 3vw, 24px);
            stroke-width: 2.5;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>รวมลิงก์สำหรับการอบรม</h1>
        </header>

        <div class="links-grid">
            <!-- Pre-test -->
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScXyJVRF4ZxJMGS8xc_h8LuMDNQd60iVixJds1zLJ47XEwIpw/viewform?usp=publish-editor"
                class="link-card" target="_blank">
                <div class="icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                    </svg>
                </div>
                <div class="content">
                    <h3>แบบทดสอบก่อนเรียน</h3>
                </div>
                <svg class="arrow-icon link-arrow" viewBox="0 0 24 24">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <!-- Slides -->
            <a href="https://docs.google.com/presentation/d/1ONBVpf3vOBfwPxLsTh4dr5wb7QKeMz7zwlfBEXhaTZA/edit?usp=sharing"
                class="link-card" target="_blank">
                <div class="icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                </div>
                <div class="content">
                    <h3>Slide ประกอบการบรรยาย</h3>
                </div>
                <svg class="arrow-icon link-arrow" viewBox="0 0 24 24">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <!-- Post-test -->
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScgNitdFnP5HJqe-qUy9akX6JCZK18OVRPIQy1xQ1vAQQsCTA/viewform?usp=publish-editor"
                class="link-card" target="_blank">
                <div class="icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                    </svg>
                </div>
                <div class="content">
                    <h3>แบบทดสอบหลังเรียน</h3>
                </div>
                <svg class="arrow-icon link-arrow" viewBox="0 0 24 24">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>
        </div>
    </div>
</body>

</html>
